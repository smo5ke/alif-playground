<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="./AlifLogo.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة ألف 5.3 التفاعلية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            height: 100dvh; 
            background-color: #0f172a; 
        }
        
        /* توحيد الخطوط لطبقة التلوين وطبقة الكتابة */
        .code-font {
            font-family: 'Consolas', 'Courier New', monospace !important; 
            tab-size: 4; 
            line-height: 1.6; 
            font-size: 14px;
        }
        @media (min-width: 640px) {
            .code-font { font-size: 16px; }
        }
        
        #output-content, #terminalInput { 
            font-family: 'Consolas', 'Courier New', monospace; 
            tab-size: 4; 
            line-height: 1.6; 
        }
        
        #output-content { white-space: pre-wrap; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="text-slate-200 flex flex-col overflow-hidden">

    <header class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700/50 p-3 sm:p-4 flex justify-between items-center shadow-lg z-10 shrink-0">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="./AlifLogo.ico" alt="شعار لغة ألف" class="h-8 sm:h-11 w-auto object-contain drop-shadow-md">
            <h1 class="text-lg sm:text-2xl font-bold tracking-wide text-slate-100 pt-1">
                محرر <span class="text-blue-400">ألف 5.3</span>
            </h1>
        </div>
        <button onclick="startRun()" id="runBtn" class="bg-slate-600 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg disabled:opacity-70 disabled:cursor-not-allowed">
            <span>جاري الاتصال...</span>
            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
    </header>

    <main class="flex-1 grid grid-rows-2 md:grid-rows-1 md:grid-cols-2 overflow-hidden bg-[#0b1120]">
        
        <section class="flex flex-col overflow-hidden border-b md:border-b-0 md:border-l border-slate-700/50">
            <div class="bg-slate-800/50 text-slate-400 text-xs sm:text-sm py-2 px-4 border-b border-slate-700/50 shrink-0 flex items-center justify-between">
                <span class="flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> الكود المصدري</span>
            </div>
            
            <div class="flex-1 relative overflow-hidden bg-transparent">
                <pre id="highlightLayer" class="code-font absolute top-0 right-0 w-full h-full p-4 overflow-auto whitespace-pre-wrap break-all pointer-events-none text-slate-300 z-0 text-right bg-transparent" dir="rtl"></pre>
                
                <textarea id="editor" class="code-font absolute top-0 right-0 w-full h-full p-4 bg-transparent text-transparent caret-white outline-none resize-none overflow-auto whitespace-pre-wrap break-all z-10 text-right" dir="rtl" spellcheck="false" placeholder="اكتب كود ألف 5.3 هنا...">
# مثال يبرز قوة البرمجة كائنية التوجه (OOP) في ألف 5.3

صنف انسان:
    دالة __تهيئة__(هذا, عمر):
        هذا.العمر = عمر

صنف شخص(انسان):
    دالة __تهيئة__(هذا, عمر, طول):
        اصل().__تهيئة__(عمر)
        هذا.الطول = طول

    دالة __عرض__(هذا):
        ارجع م"الطول: {هذا.الطول} سم، العمر: {هذا.العمر} سنة"

# إنشاء كائن جديد وتجربته
البطل = شخص(25, 180)
اطبع("--- بيانات اللاعب ---")
اطبع(البطل)
</textarea>
            </div>
        </section>

        <section class="flex flex-col overflow-hidden bg-black/40 relative shadow-inner">
            <div class="bg-slate-800/50 text-slate-400 text-xs sm:text-sm py-2 px-4 border-b border-slate-700/50 flex justify-between items-center shrink-0">
                <span class="flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-400"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg> شاشة المخرجات (Terminal)</span>
                <button onclick="clearConsole()" class="text-slate-500 hover:text-slate-200 transition-colors px-2 py-1 rounded hover:bg-slate-700/50 text-xs">مسح الشاشة</button>
            </div>
            
            <div id="output-container" class="flex-1 p-4 overflow-y-auto" dir="rtl" style="text-align: right;">
                <div id="output-content" class="text-slate-300 text-sm sm:text-base leading-relaxed"></div>
            </div>

            <div class="bg-slate-900/80 backdrop-blur border-t border-slate-700/50 flex items-center px-3 py-2 sm:px-4 sm:py-3 shrink-0">
                <span class="text-green-500 font-bold ml-2 shrink-0">>></span>
                <input type="text" id="terminalInput" class="flex-1 bg-transparent text-white outline-none text-sm sm:text-base placeholder-slate-600" placeholder="اكتب إدخالك هنا واضغط Enter..." disabled>
            </div>
        </section>

    </main>

    <script>
        const editor = document.getElementById('editor');
        const highlightLayer = document.getElementById('highlightLayer');
        const outputContent = document.getElementById('output-content');
        const outputContainer = document.getElementById('output-container');
        const terminalInput = document.getElementById('terminalInput');
        const runBtn = document.getElementById('runBtn');
        let ws;
        
        // متغير عالمي لحساب عدد الأسطر المطبوعة
        let totalOutputLines = 0;

        // دالة التلوين بمسار واحد (Single-Pass) تمنع أي تداخل أو أخطاء
        function updateHighlight() {
            let code = editor.value;
            
            // 1. تشفير الأقواس لكي لا يقرأها المتصفح كأكواد HTML
            let html = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // 2. محرك بحث موحد يعزل الكلمات المفتاحية والأرقام والنصوص بدقة تامة
            const regex = /(#.*)|(م?"[^"]*")|(?<=^|[^أ-يa-zA-Z0-9_])(اطبع|ادخل|اذا|والا|طالما|كرر|لكل|في|دالة|ارجع|صح|خطأ)(?=[^أ-يa-zA-Z0-9_]|$)|(?<=^|[^أ-يa-zA-Z0-9_])(\d+)(?=[^أ-يa-zA-Z0-9_]|$)|([=+\-*/])/g;

            html = html.replace(regex, (match, comment, str, kw, num, op) => {
                if (comment) return `<span class="text-slate-500 italic">${comment}</span>`;
                if (str)     return `<span class="text-amber-400">${str}</span>`;
                if (kw)      return `<span class="text-fuchsia-400 font-bold">${kw}</span>`;
                if (num)     return `<span class="text-cyan-400">${num}</span>`;
                if (op)      return `<span class="text-blue-400 font-bold">${op}</span>`;
                return match;
            });

            highlightLayer.innerHTML = html + (code.endsWith('\n') ? '\n ' : '');
        }

        editor.addEventListener('input', updateHighlight);

        editor.addEventListener('scroll', () => {
            highlightLayer.scrollTop = editor.scrollTop;
            highlightLayer.scrollLeft = editor.scrollLeft;
        });

        editor.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
                updateHighlight();
            }
        });

        function clearConsole() { 
            outputContent.innerHTML = ''; 
            totalOutputLines = 0; // تصفير عداد الأسطر
            if (outputContent.dataset) outputContent.dataset.limitReached = "false";
        }

        // تم تحديث الأزرار لتكون بشنفرة (rounded-xl) والنص على اليمين والأيقونة يسار
        function setButtonState(state) {
            if (state === 'connecting') {
                runBtn.innerHTML = '<span>جاري الاتصال...</span> <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
                runBtn.disabled = true;
                runBtn.className = "bg-slate-600 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg cursor-not-allowed opacity-80";
            } else if (state === 'ready') {
                runBtn.innerHTML = '<span>تشغيل الكود</span> <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none" class="rotate-180"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                runBtn.disabled = false;
                runBtn.className = "bg-gradient-to-r from-green-600 to-emerald-500 hover:from-green-500 hover:to-emerald-400 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-green-900/20 active:scale-95";
            } else if (state === 'running') {
                runBtn.innerHTML = '<span>قيد التنفيذ...</span> <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
                runBtn.disabled = true;
                runBtn.className = "bg-slate-600 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg cursor-not-allowed opacity-80";
            } else if (state === 'error') {
                runBtn.innerHTML = '<span>انقطع الاتصال</span> <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>';
                runBtn.disabled = true;
                runBtn.className = "bg-red-600 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg cursor-not-allowed opacity-90";
            }
        }

        function connectWebSocket() {
            setButtonState('connecting');

            try {
                ws = new WebSocket('wss://alif-playground.onrender.com');
                
                ws.onopen = () => {
                    setButtonState('ready');
                    outputContent.innerHTML = `<span class="text-green-500 font-bold">--- تم الاتصال بمحرك ألف 5.3 بنجاح ---</span>\n`;
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'output' || data.type === 'error') {
                        // حماية المتصفح والسيرفر من الحلقات اللانهائية (إيقاف عند 10 آلاف سطر)
                        if (outputContent.dataset.limitReached === "true") return;

                        let newLines = (data.text.match(/\n/g) || []).length + 1;
                        totalOutputLines += newLines;

                        if (totalOutputLines > 10000) {
                            outputContent.innerHTML += `<br><span class="text-red-400 font-bold bg-red-900/20 px-2 py-1 rounded inline-block mt-2">⚠️ تم إيقاف الطباعة: تجاوزت المخرجات 10,000 سطر (حماية للمتصفح).</span>\n`;
                            outputContent.dataset.limitReached = "true";
                            outputContainer.scrollTop = outputContainer.scrollHeight;
                            
                            if(ws) ws.close(); // إغلاق الاتصال بقوة لإيقاف العملية في السيرفر
                            return;
                        }

                        const colorClass = data.type === 'error' ? 'text-red-400' : 'text-slate-300';
                        outputContent.innerHTML += `<span class="${colorClass}">${escapeHTML(data.text)}</span>`;
                        outputContainer.scrollTop = outputContainer.scrollHeight;
                        
                        terminalInput.disabled = false;
                        terminalInput.focus();
                    } 
                    else if (data.type === 'done') {
                        outputContent.innerHTML += `\n<span class="text-slate-500">--- انتهى تنفيذ البرنامج ---</span>\n`;
                        terminalInput.disabled = true;
                        setButtonState('ready');
                        outputContainer.scrollTop = outputContainer.scrollHeight;
                    }
                };

                ws.onclose = () => {
                    setButtonState('error');
                    setTimeout(connectWebSocket, 3000);
                };
                
                ws.onerror = () => {
                    if(ws.readyState !== WebSocket.CLOSED){
                         outputContent.innerHTML += `<span class="text-red-400">\nحدث خطأ في الاتصال بالسحابة.</span>\n`;
                    }
                };
            } catch (error) {
                console.error("خطأ في تهيئة الاتصال:", error);
            }
        }

        function startRun() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            clearConsole();
            setButtonState('running');
            terminalInput.disabled = false;
            terminalInput.value = '';

            // تنظيف المسافات الوهمية
            let cleanCode = editor.value.replace(/\u00A0/g, " ");

            ws.send(JSON.stringify({ type: 'run', code: cleanCode }));
        }

        terminalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = terminalInput.value;
                if (!val) return; 
                outputContent.innerHTML += `<span class="text-green-400">${escapeHTML(val)}</span>\n`;
                ws.send(JSON.stringify({ type: 'input', text: val }));
                terminalInput.value = ''; 
                
                if(window.innerWidth > 768) terminalInput.focus();
            }
        });

        function escapeHTML(text) {
            return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        connectWebSocket();
        updateHighlight();
    </script>
</body>
</html>
