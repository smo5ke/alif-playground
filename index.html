<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="./AlifLogo.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة ألف 5.3 التفاعلية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;700&display=swap');
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            height: 100dvh; 
            background-color: #0f172a; 
        }
        
        .code-font {
            font-family: 'Noto Kufi Arabic', sans-serif !important; 
            tab-size: 4; 
            line-height: 1.7; 
            font-size: 13px;
            letter-spacing: normal !important;
            word-spacing: normal !important;
        }
        @media (min-width: 640px) {
            .code-font { font-size: 15px; }
        }
        
        #output-content, #terminalInput { 
            font-family: 'Noto Kufi Arabic', sans-serif; 
            tab-size: 4; 
            line-height: 1.6; 
        }
        
        #output-content { white-space: pre-wrap; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="text-slate-200 flex flex-col overflow-hidden">

    <header class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700/50 p-3 sm:p-4 flex justify-between items-center shadow-lg z-10 shrink-0">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="./AlifLogo.ico" alt="شعار لغة ألف" class="h-8 sm:h-11 w-auto object-contain drop-shadow-md">
            <h1 class="text-lg sm:text-2xl font-bold tracking-wide text-slate-100 pt-1">
                محرر <span class="text-blue-400">ألف 5.3</span>
            </h1>
        </div>
        <button onclick="toggleRun()" id="runBtn" class="bg-slate-600 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg disabled:opacity-70 disabled:cursor-not-allowed">
            <span class="pt-[3px] sm:pt-[2px]">جاري الاتصال...</span>
            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden bg-[#0b1120]">
        
        <section class="h-1/2 md:h-full md:w-1/2 flex flex-col overflow-hidden border-b md:border-b-0 md:border-l border-slate-700/50">
            <div class="bg-slate-800/50 text-slate-400 text-xs sm:text-sm py-2 px-4 border-b border-slate-700/50 shrink-0 flex items-center justify-between">
                <span class="flex items-center gap-2">الشيفرة المصدرية</span>
            </div>
            <div class="flex-1 relative overflow-hidden">
                <textarea id="editor" class="code-font absolute inset-0 w-full h-full p-4 bg-transparent text-slate-200 caret-white outline-none resize-none overflow-auto whitespace-pre-wrap break-all z-10 text-right" dir="rtl" spellcheck="false" placeholder="اكتب كود ألف 5.3 هنا...">
# مثال يبرز قوة البرمجة كائنية التوجه (OOP) في ألف 5.3

صنف انسان:
    دالة __تهيئة__(هذا, عمر):
        هذا.العمر = عمر

صنف شخص(انسان):
    دالة __تهيئة__(هذا, عمر, طول):
        اصل().__تهيئة__(عمر)
        هذا.الطول = طول

    دالة __عرض__(هذا):
        ارجع م"الطول: {هذا.الطول} سم، العمر: {هذا.العمر} سنة"

# إنشاء كائن جديد وتجربته
البطل = شخص(25, 180)
اطبع("--- بيانات اللاعب ---")
اطبع(البطل)
</textarea>
            </div>
        </section>

        <section class="h-1/2 md:h-full md:w-1/2 flex flex-col overflow-hidden bg-black/40 relative shadow-inner">
            <div class="bg-slate-800/50 text-slate-400 text-xs sm:text-sm py-2 px-4 border-b border-slate-700/50 flex justify-between items-center shrink-0">
                <span>طرفية المخرجات</span>
                <button onclick="clearConsole()" class="text-slate-500 hover:text-slate-200 text-xs">مسح الشاشة</button>
            </div>
            <div id="output-container" class="flex-1 p-4 overflow-y-scroll" dir="rtl" style="text-align: right; width: 100%; box-sizing: border-box;">
                <div id="output-content" class="text-slate-300 text-sm sm:text-base leading-relaxed w-full"></div>
            </div>
            <div class="bg-slate-900/80 backdrop-blur border-t border-slate-700/50 flex items-center px-3 py-2 shrink-0">
                <span class="text-green-500 font-bold ml-2">>></span>
                <input type="text" id="terminalInput" class="flex-1 bg-transparent text-white outline-none text-sm" placeholder="اكتب إدخالك..." disabled>
            </div>
        </section>
    </main>

    <script>
        const editor = document.getElementById('editor');
        const outputContent = document.getElementById('output-content');
        const outputContainer = document.getElementById('output-container');
        const terminalInput = document.getElementById('terminalInput');
        const runBtn = document.getElementById('runBtn');
        
        let ws;
        let totalOutputLines = 0;
        const MAX_LINES = 10000;
        let isRunning = false;
        let intentionalClose = false;

        function clearConsole() { 
            outputContent.innerHTML = ''; 
            totalOutputLines = 0;
            if (outputContent.dataset) outputContent.dataset.limitReached = "false";
        }

        function appendToTerminal(text, colorClass) {
            const span = document.createElement('span');
            span.className = colorClass;
            span.innerHTML = text;
            let linesCount = (text.match(/\n/g) || []).length + (text.trim() === '' ? 0 : 1);
            span.dataset.lines = linesCount;
            totalOutputLines += linesCount;
            outputContent.appendChild(span);
            while (totalOutputLines > MAX_LINES && outputContent.firstChild) {
                let oldLines = parseInt(outputContent.firstChild.dataset.lines || 1);
                totalOutputLines -= oldLines;
                outputContent.removeChild(outputContent.firstChild);
            }
            outputContainer.scrollTop = outputContainer.scrollHeight;
        }

        function setButtonState(state) {
            if (state === 'connecting') {
                isRunning = false;
                runBtn.innerHTML = '<span class="pt-[3px] sm:pt-[2px]">جاري الاتصال...</span> <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
                runBtn.disabled = true;
                runBtn.className = "bg-slate-600 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg cursor-not-allowed opacity-80";
            } else if (state === 'ready') {
                isRunning = false;
                runBtn.innerHTML = '<span class="pt-[3px] sm:pt-[2px]">تشغيل</span> <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" class="rotate-180"><polygon points="5 4 19 12 5 20"></polygon></svg>';
                runBtn.disabled = false;
                runBtn.className = "bg-gradient-to-r from-green-600 to-emerald-500 hover:from-green-500 hover:to-emerald-400 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-green-900/20 active:scale-95";
            } else if (state === 'running') {
                isRunning = true;
                runBtn.innerHTML = '<span class="pt-[3px] sm:pt-[2px]">إيقاف</span> <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>';
                runBtn.disabled = false; 
                runBtn.className = "bg-red-600 hover:bg-red-500 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-red-900/20 active:scale-95";
            } else if (state === 'error') {
                isRunning = false;
                runBtn.innerHTML = '<span class="pt-[3px] sm:pt-[2px]">انقطع الاتصال</span> <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>';
                runBtn.disabled = true;
                runBtn.className = "bg-red-600 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-xl text-sm sm:text-base font-bold transition-all flex items-center justify-center gap-2 shadow-lg cursor-not-allowed opacity-90";
            }
        }

        function connectWebSocket() {
            setButtonState('connecting');
            try {
                ws = new WebSocket('wss://alif-playground.onrender.com');
                ws.onopen = () => {
                    setButtonState('ready');
                    if (outputContent.innerHTML.trim() === '') {
                        appendToTerminal("--- تم الاتصال بمحرك ألف 5.3 بنجاح ---\n", "text-green-500 font-bold");
                    } else {
                        appendToTerminal("\n--- تم إعادة الاتصال والمحرك جاهز ---\n", "text-green-500 font-bold bg-green-900/20 px-2 py-1 rounded inline-block mt-2");
                    }
                };
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === 'output' || data.type === 'error') {
                        const colorClass = data.type === 'error' ? 'text-red-400' : 'text-slate-300';
                        appendToTerminal(escapeHTML(data.text), colorClass);
                        terminalInput.disabled = false;
                        terminalInput.focus();
                    } else if (data.type === 'done') {
                        appendToTerminal("\n--- انتهى تنفيذ البرنامج ---\n", "text-slate-500");
                        terminalInput.disabled = true;
                        setButtonState('ready');
                    }
                };
                ws.onclose = () => {
                    if (intentionalClose) {
                        intentionalClose = false;
                        connectWebSocket(); 
                    } else {
                        setButtonState('error');
                        setTimeout(connectWebSocket, 3000);
                    }
                };
                ws.onerror = () => { if(ws.readyState !== WebSocket.CLOSED) appendToTerminal("\nحدث خطأ في الاتصال.\n", "text-red-400"); };
            } catch (error) { console.error("Error:", error); }
        }

        function toggleRun() {
            if (isRunning) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    intentionalClose = true;
                    ws.close(); 
                    appendToTerminal("\n⚠️ تم إيقاف التنفيذ يدوياً.\n", "text-amber-400 font-bold");
                    terminalInput.disabled = true;
                }
            } else {
                startRun();
            }
        }

        function startRun() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            clearConsole();
            setButtonState('running');
            terminalInput.disabled = false;
            terminalInput.value = '';
            let cleanCode = editor.value.replace(/\u00A0/g, " ");
            ws.send(JSON.stringify({ type: 'run', code: cleanCode }));
        }

        terminalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = terminalInput.value;
                if (!val) return; 
                appendToTerminal(escapeHTML(val) + "\n", "text-green-400");
                ws.send(JSON.stringify({ type: 'input', text: val }));
                terminalInput.value = ''; 
                if(window.innerWidth > 768) terminalInput.focus();
            }
        });

        function escapeHTML(text) { return text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        connectWebSocket();
    </script>
</body>
</html>
